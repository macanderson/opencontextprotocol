name: Bug report
description: Report a defect in an OCP crate or the specification
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A precise repro helps it land fast.
  - type: dropdown
    id: area
    attributes:
      label: Affected crate / surface
      description: Which part of OCP is this about?
      options:
        - ocp-types (wire types)
        - ocp-host (host runtime / transports / consent)
        - ocp-conformance (conformance suite / ocp-inspect)
        - documentation / spec
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Crate version(s)
      description: The version of the OCP crate(s) you are using (e.g. `ocp-types 0.1.0`).
      placeholder: "ocp-types 0.1.0, ocp-host 0.1.0"
    validations:
      required: true
  - type: input
    id: protocol-version
    attributes:
      label: Protocol version
      description: The negotiated protocol version, if relevant (e.g. `ocp/1.0-draft`).
      placeholder: "ocp/1.0-draft"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior. Include the minimal envelope(s) or code that triggers it.
      placeholder: |
        When the host sends a query with max_tokens=0, the provider returns...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: The behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: The exact commands or code to reproduce, start to finish.
      placeholder: |
        1. cargo run -p ocp-conformance --bin ocp-inspect -- stdio -- ./my-provider
        2. ...
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant output, stack traces, or the `ocp-inspect --json` report. Paste as-is.
      render: shell
  - type: checkboxes
    id: conformance
    attributes:
      label: Conformance status
      options:
        - label: I can reproduce this against a conformant provider (passes `ocp-inspect`)
          required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Contribution terms
      options:
        - label: I agree to dual-license this contribution under MIT OR Apache-2.0, per the DCO sign-off
          required: true
