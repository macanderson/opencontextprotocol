name: CI

# For a project whose pitch is "conformance is a test you run in CI", the spec
# repo not running conformance in CI was a credibility gap. Every normative
# guarantee below is machine-verified on every PR: the suite goes green on a
# conformant provider AND red on each deliberately-broken one, because a suite
# that only ever passes proves nothing.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  msrv:
    name: msrv (rust-version from Cargo.toml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Read the pinned MSRV rather than hardcoding it, so bumping
      # `workspace.package.rust-version` cannot silently desynchronize CI from
      # the version the crates claim to support.
      - id: msrv
        run: |
          version=$(grep -m1 '^rust-version' Cargo.toml | cut -d'"' -f2)
          echo "Detected MSRV: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  conformance:
    name: conformance (green and --misbehave red)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --bins
      - name: Suite is green against the conformant fixture
        run: ./.github/scripts/conformance-green.sh
      - name: Suite is red against every --misbehave mode
        run: ./.github/scripts/conformance-red.sh
      - name: Reference host upholds every host-binding rule (§11.1, #14)
        run: ./.github/scripts/host-conformance.sh

  sdk-typescript:
    name: sdk (typescript) is a conformant implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --bins
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build the TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build
      - name: TS example provider passes the conformance suite
        run: ./.github/scripts/conformance-external.sh -- node sdk/typescript/dist/examples/example-docs.js

  sdk-python:
    name: sdk (python) is a conformant implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --bins
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python example provider passes the conformance suite
        run: ./.github/scripts/conformance-external.sh -- python3 sdk/python/examples/example_docs.py

  sdk-go:
    name: sdk (go) is a conformant implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --bins
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet and build the Go SDK
        working-directory: sdk/go
        run: |
          go vet ./...
          go build -o "$GITHUB_WORKSPACE/cg-go-example" ./examples/example-docs
      - name: Go example provider passes the conformance suite
        run: ./.github/scripts/conformance-external.sh -- ./cg-go-example

  schema:
    name: schema validates the examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python3 schema/validate-examples.py

  site:
    name: docs site builds
    runs-on: ubuntu-latest
    # Hard gate: the docs site build must pass. It was advisory-only
    # (continue-on-error) during early churn so a broken lockfile there could
    # not block a spec change; now that the build is stable it is promoted to a
    # required check, so a broken marketing surface can no longer ship silently.
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: site
      - run: pnpm build
        working-directory: site
